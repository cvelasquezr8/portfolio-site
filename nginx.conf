server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache static assets aggressively (Astro hashes filenames)
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache fonts and images
    location ~* \.(woff2?|ttf|otf|eot|png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 6M;
        add_header Cache-Control "public";
    }

    # Cache PDFs
    location ~* \.pdf$ {
        expires 1d;
        add_header Cache-Control "public";
    }

    # i18n: redirect root to /en/
    location = / {
        return 301 /en/;
    }

    # Serve all other routes — Astro generates static HTML files
    location / {
        try_files $uri $uri/ $uri.html /404.html =404;
    }
}
