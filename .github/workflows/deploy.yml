name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache Astro build
        uses: actions/cache@v4
        with:
          path: |
            node_modules/.astro
            .astro
          key: ${{ runner.os }}-astro-cache-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-astro-cache-

      - name: Install dependencies
        run: npm ci

      - name: Build Astro project
        run: npm run build
        env:
          BACKEND_URL_PROD: ${{ secrets.BACKEND_URL_PROD }}
